# Auto DM — backend only.
#
# Postgres + Redis are assumed to already be running on this Docker
# host (the user's existing infra). Override the URLs in the
# ``environment`` block below if they live on different hosts.
#
# Run:
#   docker compose up -d --build
#   docker compose logs -f auto-dm
#   docker compose down

services:
  auto-dm:
    build:
      context: .
      dockerfile: Dockerfile
    image: auto-dm:0.1.0
    container_name: auto-dm
    restart: unless-stopped
    ports:
      # Bind only to localhost; the public-facing nginx reverse proxy
      # listens on 443 and proxies to this port via the Docker network.
      - "127.0.0.1:4004:4004"
    environment:
      # --- Backend / persistence ---
      ENVIRONMENT: "production"
      LOG_LEVEL: "INFO"
      # PostgreSQL — point at the existing container/host.
      DATABASE_URL: "${DATABASE_URL:-postgresql+asyncpg://auto_dm:auto_dm@host.docker.internal:5432/auto_dm}"
      # Redis — point at the existing container/host.
      REDIS_URL: "${REDIS_URL:-redis://host.docker.internal:6379/0}"
      # JWT — set JWT_SECRET in your .env (≥32 chars). Generate with:
      #   openssl rand -hex 32
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set (≥32 chars)}"
      JWT_EXPIRES_MINUTES: "10080"  # 7 days
      SESSION_TTL_SECONDS: "86400"  # 24h
      # --- CORS ---
      # Comma-separated list of origins allowed to call the API.
      # Include your Vercel frontend URL(s) and any local dev origins.
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
      # Signup is always open. A matching invite grants access to the global
      # LLM; accounts without it are restricted to BYOK.
      INVITE_CODE: "${INVITE_CODE:-}"
      # --- Admin seed (Phase 29) ---
      # Seeds the single admin account at startup. Leave ADMIN_PASSWORD
      # empty to skip seeding (no admin login). ADMIN_USERNAME defaults
      # to "admin".
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      # --- LLM provider (Minimax) ---
      AUTO_DM_PROVIDER: "${AUTO_DM_PROVIDER:-minimax}"
      AUTO_DM_API_KEY: "${AUTO_DM_API_KEY:?AUTO_DM_API_KEY must be set}"
      AUTO_DM_BASE_URL: "${AUTO_DM_BASE_URL:-}"
      AUTO_DM_MODEL: "${AUTO_DM_MODEL:-MiniMax-Text-01}"
      AUTO_DM_TEMPERATURE: "${AUTO_DM_TEMPERATURE:-0.8}"
      # 8192: MiniMax thinking tokens share this budget with the visible
      # narration — 2048 truncated long openings mid-word.
      # Set AUTO_DM_MAX_TOKENS=0 in .env for "sem limite" (omits the cap
      # from the request; the model's own output ceiling applies).
      AUTO_DM_MAX_TOKENS: "${AUTO_DM_MAX_TOKENS:-8192}"
      # --- Per-user LLM credentials (BYOK) ---
      # AUTO_DM_CREDENTIALS_KEY must be versioned, e.g. "1:<fernet-key>".
      AUTO_DM_BYOK_ENABLED: "${AUTO_DM_BYOK_ENABLED:-0}"
      AUTO_DM_CREDENTIALS_KEY: "${AUTO_DM_CREDENTIALS_KEY:-}"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx, os; r = httpx.get(f'http://localhost:{os.environ.get(\"PORT\", 4004)}/api/health', timeout=3); r.raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
