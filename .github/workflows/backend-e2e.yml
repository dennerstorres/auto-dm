name: Backend real E2E

on:
  pull_request:
  push:
    branches: [main]

jobs:
  phase-43:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install application and test dependencies
        run: pip install -e ".[dev]"
      - name: Run real HTTP, Postgres and Redis flow
        run: make e2e
